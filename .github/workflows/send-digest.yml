name: Send digest email

on:
  schedule:
    # Daily at 13:00 UTC
    - cron: '0 13 * * *'
  workflow_dispatch: {}

jobs:
  send:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run send-digest
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
      - name: Commit updated digest state
        run: |
          git config user.name "thedukepost-bot"
          git config user.email "bot@thedukepost.com"
          git add src/data/digest-state.json
          git diff --staged --quiet || git commit -m "chore: update digest state"
          git push
